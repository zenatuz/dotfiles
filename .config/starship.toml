# ─── Starship Prompt Config ─────────────────────────────────────────
# https://starship.rs/config/
#
# Inspired by Powerlevel10k rainbow style, optimized for DevOps workflow.
# K8s, Terraform, Azure, Git — shown contextually when relevant.

# ─── Format ────────────────────────────────────────────────────────
# One line: directory + git | right: k8s/terraform/cloud + status + time
format = """
[](#303030)\
$directory\
$git_branch\
$git_status\
$fill\
$kubernetes\
$terraform\
$azure\
$python\
$cmd_duration\
$status\
$time\
[](#303030)\
$line_break\
$character"""

right_format = ""

# ─── Character ─────────────────────────────────────────────────────
[character]
success_symbol = "[›](bold green)"
error_symbol = "[›](bold red)"
vicmd_symbol = "[‹](bold yellow)"

# ─── Directory ─────────────────────────────────────────────────────
[directory]
style = "cyan bold"
truncation_length = 4
truncation_symbol = "../"
truncate_to_repo = true
home_symbol = "~"
format = "[$path]($style)"

# ─── Git Branch ───────────────────────────────────────────────────
[git_branch]
style = "purple"
format = ' [$symbol$branch]($style)'
symbol = " "

[git_status]
style = "yellow"
format = '[$all_status$ahead_behind]($style)'
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "📦${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ─── Kubernetes ───────────────────────────────────────────────────
[kubernetes]
disabled = false
format = '[☸ $context( \($namespace\))]($style) '
style = "cyan bold"
context_aliases = { "rancher-desktop" = "rancher", "orbstack" = "orb" }

# ─── Terraform ─────────────────────────────────────────────────────
[terraform]
disabled = false
format = "[$workspace]($style) "
style = "bold yellow"

# ─── Azure ─────────────────────────────────────────────────────────
[azure]
disabled = false
format = "[$subscription]($style) "
style = "bold blue"

# ─── Python ────────────────────────────────────────────────────────
[python]
format = "[$symbol$version]($style) "
style = "bold yellow"
symbol = "🐍 "

# ─── Command Duration ──────────────────────────────────────────────
[cmd_duration]
format = "[⏱ $duration]($style)"
style = "yellow"
min_time = 2000
show_milliseconds = false

# ─── Exit Code ─────────────────────────────────────────────────────
[status]
disabled = false
format = "[$symbol$status]($style) "
style = "bold red"
symbol = "✗"
not_found_symbol = "🔍"
not_executable_symbol = "🚫"
sigint_symbol = "🚦"
signal_symbol = "⚡"
map_symbol = true
recognize_signal_code = true
piped = true

# ─── Time ──────────────────────────────────────────────────────────
[time]
disabled = false
format = "[$time]($style)"
style = "bright white"
time_format = "%H:%M"
utc_time_offset = "local"

# ─── Fill (pushes right-side items to the right margin) ─────────────
[fill]
symbol = "·"

# ─── Line Break ────────────────────────────────────────────────────
[line_break]
disabled = false
