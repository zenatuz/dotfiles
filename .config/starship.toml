# ─── Starship Config: DevOps Engineer ─────────────────────────
"$schema" = 'https://starship.rs/config-schema.json'
palette = "custom1"
command_timeout = 500
add_newline = false

# ─── Prompt Format ───────────────────────────────────────────
format = """
$git_branch\
$terraform\
$docker_context\
$cmd_duration\
$jobs\
$status\
$azure | $kubernetes\
$fill\
$time\
$line_break\
$username\
$hostname\
$os\
$directory\
$git_status\
$character"""

right_format = ""

# ─── Directory ────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold text"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Desktop" = " "
"Code" = " "
"workspaces" = " "

# ─── Git ──────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch]($style) "
style = "bold yellow"

[git_status]
format = "[$untracked$staged$modified$renamed$deleted$stashed$conflicted$ahead_behind ]($style)"
staged     = "[+](green)"
modified   = "[!](yellow)"
renamed    = "[»](blue)"
deleted    = "[-](red)"
untracked  = "[?](red)"
conflicted = "[×](bold red)"
stashed    = "[$](lavender)"
ahead      = "[↑${count}](teal)"
behind     = "[↓${count}](peach)"
diverged   = "[↕](mauve)"

[git_metrics]
disabled = false

# ─── Kubernetes ───────────────────────────────────────────────
[kubernetes]
disabled = false
symbol = "󱃾"
format = ' [$symbol]($style) $context'
style = "bold text"

# ─── Azure ────────────────────────────────────────────────────
[azure]
disabled = false
symbol = ""
format = ' [$symbol]($style) $subscription'
style = "bold text"

# ─── Terraform ────────────────────────────────────────────────
[terraform]
format = "via [$symbol$workspace]($style) "
style = "bold green"

# ─── Docker Context ───────────────────────────────────────────
[docker_context]
format = "via [$symbol$context]($style) "
style = "bold blue"
only_with_files = true

# ─── Command Duration ─────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"
show_notifications = true
min_time_to_notify = 30_000

# ─── Exit Status ──────────────────────────────────────────────
[status]
disabled = false
format = "[$symbol$status]($style) "
style = "bold red"
map_symbol = true
pipestatus = true

# ─── Character ────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ─── Time (right prompt) ──────────────────────────────────────
[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "bold text"

# ─── Identity ─────────────────────────────────────────────────
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold green"

# ─── Languages / Runtimes ────────────────────────────────────
[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"

[python]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold yellow"

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold teal"

# ─── OS Icon (Apple / Penguin) ────────────────────────────────
[os]
disabled = false
style = "bold text"
format = "[$symbol]($style)"

[os.symbols]
Macos = "󰀵 "
Linux = "󰌽 "
NixOS = "󰌽 "

# ─── Jobs ──────────────────────────────────────────────────────
[jobs]
symbol = " "
style = "bold yellow"
number_threshold = 1
format = '[$symbol$number]($style) '

# ─── Disable what we don't need ──────────────────────────────
[package]
disabled = true

[battery]
disabled = true

# ─── Palette ──────────────────────────────────────────────────
[palettes.custom1]
crust = "#11111b"
mantle = "#181825"
base = "#1e1e2e"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
