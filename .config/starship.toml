# ─── Starship Config: DevOps Engineer ─────────────────────────
"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 1000
add_newline = true

# ─── Prompt Format ───────────────────────────────────────────
format = """
$username\
$hostname\
$os\
$directory\
$git_branch\
$git_status\
$terraform\
$docker_context\
$cmd_duration\
$fill\
$kubernetes | $azure | $battery $time\
$line_break\
$status\
$character"""

right_format = ""

# ─── Directory ────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold white"

# ─── Git ──────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch]($style) "
style = "bold yellow"

[git_status]
style = "bold red"

# ─── Kubernetes ───────────────────────────────────────────────
[kubernetes]
disabled = false
format = '[k8s:$context( \($namespace\))]($style) '
style = "bold white"

# ─── Azure ────────────────────────────────────────────────────
[azure]
disabled = false
format = "[az:$subscription]($style) "
style = "bold white"

# ─── Terraform ────────────────────────────────────────────────
[terraform]
format = "via [$symbol$workspace]($style) "
style = "bold 113"

# ─── Docker Context ───────────────────────────────────────────
[docker_context]
format = "via [$symbol$context]($style) "
style = "bold blue"
only_with_files = true

# ─── Command Duration ─────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"
show_notifications = true
min_time_to_notify = 30_000

# ─── Exit Status ──────────────────────────────────────────────
[status]
disabled = false
format = "[$symbol$status]($style) "
style = "bold red"
map_symbol = true
pipestatus = true

# ─── Character ────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ─── Time (right prompt) ──────────────────────────────────────
[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "bold white"

# ─── Identity ─────────────────────────────────────────────────
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold green"

# ─── Languages / Runtimes ────────────────────────────────────
[nodejs]
format = "via [$symbol($version )]($style)"
style = "bold green"

[python]
format = "via [$symbol($version )]($style)"
style = "bold yellow"

[golang]
format = "via [$symbol($version )]($style)"
style = "bold cyan"

# ─── OS Icon (Apple / Penguin) ────────────────────────────────
[os]
disabled = false
style = "bold white"
format = "[$symbol]($style)"

[os.symbols]
Macos = "󰀵 "
Linux = "󰌽 "
NixOS = "󰌽 "

# ─── Disable what we don't need ──────────────────────────────
[package]
disabled = true

[battery]
disabled = false
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "
